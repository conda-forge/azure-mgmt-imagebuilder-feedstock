schema_version: 1

context:
  name: azure-mgmt-imagebuilder
  version: 1.3.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/azure-mgmt-imagebuilder-${{ version }}.tar.gz
  sha256: 3f325d688b6125c2fa92681e5b18ea407ba032d5be3f7c0724406d733e6c14ef

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - setuptools
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}
    - azure-common >=1.1,<2.0
    - azure-mgmt-core >=1.3.2,<2.0
    - isodate >=0.6.1,<1.0

tests:
  - python:
      imports:
        - azure.mgmt.imagebuilder
        - azure.mgmt.imagebuilder.aio
      pip_check: true
      python_version: ${{ python_min }}.*
about:
  summary: Microsoft Azure Image Builder Client Library for Python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - janjagusch
